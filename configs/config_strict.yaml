# 엄격한 필터링 설정 파일 - 통과율 5% 이하 목표

# 로깅 설정
logging:
  level: INFO
  file_path: logs/lotto_app.log
  format: '%(asctime)s - %(levelname)s - %(message)s'

# 데이터 수집 설정
data_collection:
  base_url: "https://www.dhlottery.co.kr/common.do?method=getLottoNumber"
  timeout: 10
  max_retries: 3
  delay_between_requests: 0.5

# 필터링 설정
filtering:
  batch_size: 10000
  use_parallel: true
  max_workers: 8
  use_bit_operations: true
  use_early_termination: true
  combine_independent_filters: true

# 필터별 기준값 (매우 엄격하게 조정)
filter_criteria:
  # 1. 이전 당첨번호와의 일치 개수 (더 엄격하게)
  match:
    max_match: 3  # 최대 3개까지만 일치 허용 (기존 5)
    
  # 2. 홀짝 비율 (더 엄격하게)
  odd_even:
    excluded_counts: [0, 1, 5, 6]  # 0:6, 1:5, 5:1, 6:0 제외 (기존 0, 6만)
    # 2:4, 3:3, 4:2만 허용
    
  # 3. 연속 번호 (더 엄격하게)
  consecutive:
    max_consecutive: 2  # 최대 2개 연속만 허용 (기존 4)
    min_gap: 1
    
  # 4. 번호 합계 범위 (더 좁게)
  sum_range:
    min_sum: 100  # 기존 70
    max_sum: 170  # 기존 210
    
  # 5. 고정 간격 패턴 (더 엄격하게)
  fixed_step:
    all_steps:
      steps_to_exclude: [2, 3, 4, 5, 6, 7]
      required_matches: 6
    partial_steps:
      steps_to_exclude: [2, 3, 4]  # 기존 [2, 3, 4, 5]
      required_matches: 4  # 기존 5
    four_steps:
      steps_to_exclude: [2, 3]  # 기존 [2, 3, 4]
      required_matches: 3  # 기존 4
    three_steps:
      steps_to_exclude: []  # 기존 [2]
      required_matches: 2  # 기존 3
      
  # 6. 끝자리 패턴 (더 엄격하게)
  last_digit:
    min_same_last_digits: 3  # 최소 3개 다른 끝자리 필요 (기존 4)
    
  # 7. 최대 간격 (더 좁게)
  max_gap:
    min_gap: 5   # 기존 2
    max_gap: 20  # 기존 31
    
  # 8. 구간별 분포 (더 엄격하게)
  section:
    max_numbers_per_section: 3  # 각 구간 최대 3개 (기존 5)
    # 구간: 1-15, 16-30, 31-45
    
  # 9. 평균값 (더 좁게)
  average:
    min_average: 15.0  # 기존 10.5
    max_average: 30.0  # 기존 37.0
    
  # 10. 배수 패턴 (더 엄격하게)
  multiple:
    multiples:
      3: [1, 2, 3]  # 3의 배수 1-3개만 (기존 0-5)
      4: [0, 1, 2]  # 4의 배수 0-2개만 (기존 0-4)
      5: [0, 1, 2]  # 5의 배수 0-2개만 (기존 0-4)
      
  # 11. 10구간 분석 (더 엄격하게)
  ten_section:
    section_limits:
      section1: [0, 1, 2]  # 1-10 구간 (기존 6)
      section2: [0, 1, 2]  # 11-20 구간 (기존 6)
      section3: [0, 1, 2]  # 21-30 구간 (기존 6)
      section4: [0, 1, 2]  # 31-40 구간 (기존 6)
      section5: [0, 1]     # 41-45 구간 (기존 5, 6)
      
  # 12. 등차수열 (더 엄격하게)
  arithmetic_sequence:
    max_length: 3  # 최대 3개 연속 등차수열 (기존 5)
    
  # 13. 등비수열 (더 엄격하게)
  geometric_sequence:
    max_length: 2  # 최대 2개 연속 등비수열 (기존 4)
    
  # 14. 소수/합성수 (새로운 기준)
  prime_composite:
    min_primes: 2  # 최소 2개 소수
    max_primes: 4  # 최대 4개 소수
    
  # 15. 자릿수 합 (더 좁게)
  digit_sum:
    min_sum: 25  # 기존 18
    max_sum: 45  # 기존 60
    min_range: 5  # 기존 2
    max_range: 10 # 기존 12
    
  # 16. 분산도 (더 엄격하게)
  dispersion:
    min_std_dev: 8.0   # 기존 5.0
    max_std_dev: 14.0  # 기존 16.0
    min_variance: 64.0  # 기존 25.0
    max_variance: 196.0 # 기존 256.0
    min_min_gap: 1      # 기존 0
    max_min_gap: 3      # 기존 5
    min_max_gap: 8      # 기존 2
    max_max_gap: 18     # 기존 31
    min_avg_gap: 4.0    # 기존 2.0
    max_avg_gap: 7.0    # 기존 8.5

# 필터 활성화 설정
active_filters:
  match: true
  odd_even: true
  consecutive: true
  sum_range: true
  fixed_step: true
  last_digit: true
  max_gap: true
  section: true
  average: true
  multiple: true
  ten_section: true
  arithmetic_sequence: true
  geometric_sequence: true
  prime_composite: true
  digit_sum: true
  dispersion: true
  ml_prediction: false  # ML 필터는 별도 처리

# 필터 효율성 설정 (실행 순서 최적화)
filter_efficiency:
  dispersion: 0.04
  fixed_step: 0.03
  odd_even: 0.02
  sum_range: 0.01
  consecutive: 0.005
  match: 0.004
  section: 0.003
  average: 0.002
  ten_section: 0.002
  last_digit: 0.001
  multiple: 0.001
  digit_sum: 0.001
  geometric_sequence: 0.001
  max_gap: 0.001
  arithmetic_sequence: 0.001
  prime_composite: 0.001

# 동적 필터 설정
dynamic_filter:
  enable_monitoring: true
  update_interval: 300  # 5분마다 업데이트
  performance_threshold: 0.8
  auto_adjust: true