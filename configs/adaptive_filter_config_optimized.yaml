# 당첨 확률 최적화된 필터 설정 (조합수보다 당첨 확률 우선)
# 목표: 정말 가능성 없는 패턴만 제외하고 당첨 가능성 있는 조합은 최대한 포함

adaptive_options:
  analysis_window: 200       # 최근 200회차 분석
  auto_learning: true        # 자동 학습 활성화
  backtest_validation: true  # 백테스팅 검증 활성화
  max_threshold: 3.0         # 최대 임계값 낮춤 (더 많은 조합 포함)
  min_threshold: 0.3         # 최소 임계값도 낮춤
  safety_mode: true          # 안전 모드 유지
  update_frequency: 5        # 더 자주 업데이트 (5회차마다)

dynamic_criteria:
  # 평균값 범위 확대 (더 많은 조합 허용)
  average:
    min_average: 8.0         # 낮춤 (11.2 -> 8.0)
    max_average: 40.0        # 높임 (36.5 -> 40.0)
  
  # 연속번호 허용 범위 확대
  consecutive:
    max_consecutive: 5       # 확대 (4 -> 5, 실제로 5연속도 가끔 나옴)
    min_gap: 0              # 간격 제한 없음
  
  # 마지막 자리 제한 완화
  last_digit:
    min_same_last_digits: 5 # 완화 (4 -> 5)
  
  # 최대 간격 제한 완화
  max_gap:
    max_allowed_gap: 35      # 확대 (30 -> 35)
  
  # 배수 필터 범위 확대
  multiple:
    2: [0, 6]   # 확대 (5 -> 6)
    3: [0, 6]   # 확대 (5 -> 6)
    4: [0, 4]   # 확대 (3 -> 4)
    5: [0, 4]   # 확대 (3 -> 4)
  
  # 홀짝 비율 - 극단적인 경우만 제외
  odd_even:
    excluded_counts: [0, 6]  # 0:6 또는 6:0만 제외
  
  # 합계 범위 확대
  sum_range:
    min_sum: 50              # 낮춤 (68 -> 50)
    max_sum: 230             # 높임 (209 -> 230)
  
  # 구간 분포 제한 완화
  ten_section:
    section1: [0, 6]         # 모든 섹션 6개까지 허용
    section2: [0, 6]
    section3: [0, 6]
    section4: [0, 6]
    section5: [0, 6]

# 필터 활성화 설정 (당첨 확률 최적화)
filters:
  # 핵심 필터만 활성화
  sum_range: true           # 합계 범위 (중요)
  odd_even: true            # 홀짝 비율 (중요)
  consecutive: true         # 연속 번호 (중요)
  average: true             # 평균값 (중요)
  max_gap: true             # 최대 간격 (중요)
  match: true               # 과거 일치 패턴 (중요)
  
  # 보조 필터 (완화된 상태로 활성화)
  multiple: true            # 배수 패턴 (활성화하되 범위 확대)
  ten_section: true         # 구간 분포 (활성화하되 범위 확대)
  
  # 비활성화 필터 (너무 제한적)
  arithmetic: false         # 등차수열 (너무 제한적)
  geometric: false          # 등비수열 (너무 제한적)
  fixed_step: false         # 고정 간격 (너무 제한적)
  last_digit: false         # 마지막 자리 (별로 중요하지 않음)
  digit_sum: false          # 자릿수 합 (별로 중요하지 않음)
  dispersion: false         # 분산 (별로 중요하지 않음)
  prime_composite: false    # 소수/합성수 (별로 중요하지 않음)
  section: false            # 섹션 필터 (ten_section으로 대체)

# 전역 확률 임계값 (핵심 설정)
global_probability_threshold: 0.5  # 낮춤 (1.0 -> 0.5)
# 0.5% 미만 발생 패턴만 제외 (더 많은 조합 포함)

# 로깅 설정
logging:
  log_excluded_patterns: true      # 제외된 패턴 로깅
  statistics_interval: 25          # 통계 출력 간격 (더 자주)
  verbosity: INFO

# 성능 설정
performance:
  batch_size: 10000               # 배치 크기 유지
  cache_ttl: 1800                 # 캐시 TTL 줄임 (더 자주 갱신)
  enable_cache: true              # 캐시 활성화
  max_workers: 14                 # 워커 수 증가 (8 -> 14)
  parallel_processing: true       # 병렬 처리 활성화

# ML 모델 통합 설정
ml_integration:
  ml_bypass_filters: 8            # ML 예측이 통과할 수 있는 필터 수 (7 -> 8)
  ml_weight: 0.4                  # ML 예측 가중치 (0.3 -> 0.4)
  ensemble_confidence_threshold: 0.25  # 앙상블 신뢰도 임계값 낮춤 (0.3 -> 0.25)

# 백테스팅 목표
backtesting_targets:
  min_average_matches: 0.8        # 최소 평균 매치 목표
  max_average_matches: 2.0        # 최대 평균 매치 목표
  target_inclusion_rate: 0.15     # 목표 포함률 (15%)
  winning_probability_weight: 0.7  # 당첨 확률 가중치 (70%)
  combination_count_weight: 0.3    # 조합수 가중치 (30%)

# 자동 조정 설정
auto_adjustment:
  enabled: true                    # 자동 조정 활성화
  adjustment_interval: 5           # 5회차마다 조정
  performance_threshold: 0.8       # 성능 임계값
  probability_priority: true       # 확률 우선 모드 활성화