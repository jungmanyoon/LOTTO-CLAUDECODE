# 실시간 학습 테스트용 설정
# 테스트 환경에서 빠른 학습 업데이트를 위한 설정

execution_flags:
  no_realtime_learning: false  # 실시간 학습 활성화
  
realtime_learning:
  enabled: true
  test_mode: true  # 테스트 모드 활성화
  
  learning_config:
    mini_batch_size: 1      # 테스트용: 1개 데이터로도 학습
    buffer_size: 10        # 테스트용: 작은 버퍼
    update_frequency: 1     # 매 회차마다 업데이트
    learning_rate_decay: 0.99  # 느린 학습률 감소
    performance_window: 5   # 작은 성능 추적 윈도우
    min_improvement: 0.001  # 낮은 개선 임계값
    
  # 운영 환경 설정 (참고용)
  production_config:
    mini_batch_size: 20
    buffer_size: 100
    update_frequency: 5
    learning_rate_decay: 0.95
    performance_window: 10
    min_improvement: 0.01