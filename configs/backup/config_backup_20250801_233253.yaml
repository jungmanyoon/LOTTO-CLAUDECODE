# 최적화된 로또 예측 시스템 설정
# 무한 학습 루프 문제 해결 및 성능 최적화 버전
# 작성일: 2025-08-01
# 버전: 2.0

# 시스템 전체 설정
system:
  name: "로또 예측 시스템 v2.0"
  mode: "production"  # development, production
  debug: false
  version: "2.0.0"

# 로깅 설정
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "logs/lotto_app.log"
  max_size: 10485760  # 10MB
  backup_count: 5
  format: "%(asctime)s - %(levelname)s - [%(name)s] %(message)s"
  
# 데이터베이스 설정
database:
  base_dir: "data"
  connection_timeout: 30
  max_retries: 3
  pool_size: 5

# 필터 설정
filters:
  enabled: true
  parallel_processing: true
  cache_enabled: true
  cache_ttl: 3600  # 1시간
  
  # 각 필터별 설정
  settings:
    match_filter:
      enabled: true
      min_match: 0
      max_match: 3
    odd_even_filter:
      enabled: true
      patterns: ["3:3", "4:2", "2:4"]
    consecutive_filter:
      enabled: true
      max_consecutive: 3
    sum_range_filter:
      enabled: true
      min_sum: 100
      max_sum: 180

# ML/AI 설정 (최적화됨)
ml:
  # 앙상블 모델 설정
  ensemble:
    enabled: true
    models: ["random_forest", "xgboost", "neural_network"]
    voting: "soft"
    update_interval: 86400  # 24시간
    
  # LSTM 설정
  lstm:
    enabled: true
    sequence_length: 20
    hidden_size: 128
    num_layers: 2
    batch_size: 32
    epochs: 50  # 초기 학습용
    learning_rate: 0.001
    
  # 모델 학습 설정
  training:
    auto_train: false  # 자동 학습 비활성화
    validation_split: 0.2
    early_stopping_patience: 10
    save_best_only: true

# 자동 조정 시스템 (개선됨)
auto_adjustment:
  enabled: false  # 무한 루프 방지를 위해 기본 비활성화
  check_interval: 86400  # 24시간 (기존 30분에서 변경)
  max_iterations: 5  # 최대 5회 체크 후 중단
  performance_threshold: 0.85  # 성능이 85% 이상이면 조정 안함
  new_data_check_interval: 3600  # 1시간마다 새 데이터 확인
  
  # 조정 조건
  adjustment_conditions:
    min_new_rounds: 5  # 최소 5회차 새 데이터 필요
    performance_drop: 0.1  # 10% 이상 성능 하락시
    consecutive_failures: 3  # 3회 연속 실패시

# ML 최적화 설정 (개선됨)
ml_optimization:
  enabled: false  # 초기에는 비활성화
  
  # Optuna 설정 (trial 수 대폭 감소)
  optuna_trials: 10  # 기존 50에서 10으로
  lstm_trials: 10    # 기존 30에서 10으로  
  monte_carlo_trials: 10  # 기존 40에서 10으로
  
  # 조기 종료 설정
  early_stopping:
    enabled: true
    min_improvement: 0.001  # 0.1% 미만 개선시 중단
    patience: 5  # 5회 개선 없으면 중단
  
  # 최적화 간격
  optimization_interval: 604800  # 1주일 (7일)
  skip_if_recent: true  # 최근 최적화했으면 건너뛰기

# 실시간 학습 설정 (개선됨)
realtime_learning:
  enabled: false  # 기본 비활성화
  
  # 학습 조건
  learning_config:
    mini_batch_size: 10
    update_frequency: 5  # 5회차마다
    min_update_interval: 86400  # 최소 24시간 간격
    performance_threshold: 0.85  # 85% 이상이면 학습 안함
    learning_rate_decay: 0.95
    momentum: 0.9
    
  # 버퍼 설정
  buffer:
    max_size: 100
    cleanup_interval: 3600

# 성능 모니터링
performance_monitoring:
  enabled: true
  metrics_interval: 300  # 5분
  alert_threshold: 0.7  # 70% 이하로 떨어지면 경고
  
  # 메트릭 저장
  save_metrics: true
  metrics_retention_days: 30

# 백테스팅 설정
backtesting:
  enabled: true
  test_rounds: 100  # 최근 100회차로 테스트
  confidence_threshold: 0.6
  
# 캐싱 설정
caching:
  enabled: true
  filter_cache_ttl: 3600  # 1시간
  prediction_cache_ttl: 300  # 5분
  max_cache_size: 1000  # 최대 1000개 항목

# 리소스 제한
resource_limits:
  max_memory_mb: 2048  # 2GB
  max_cpu_percent: 80  # 80%
  max_threads: 10
  
# 안전 모드 설정
safety_mode:
  enabled: true
  auto_recovery: true
  max_retries: 3
  cooldown_period: 300  # 5분

# 실행 플래그 (명령줄 옵션 기본값)
execution_flags:
  skip_ml: false
  skip_filters: false
  skip_optimization: true  # 최적화 건너뛰기
  no_auto_adjust: true     # 자동 조정 비활성화
  no_realtime_learning: true  # 실시간 학습 비활성화
  
# 출력 설정
output:
  max_combinations: 10
  show_probabilities: true
  save_results: true
  results_dir: "results"
  format: "json"  # json, csv, txt

# 알림 설정
notifications:
  enabled: false
  email:
    smtp_server: ""
    smtp_port: 587
    sender: ""
    recipient: ""
  
# 개발자 설정
developer:
  debug_mode: false
  profiling: false
  test_mode: false
  mock_data: false

# 버전 정보
version_info:
  created: "2025-08-01"
  modified: "2025-08-01"
  author: "Lotto Prediction System Team"
  description: "무한 학습 루프 문제 해결 및 성능 최적화 버전"