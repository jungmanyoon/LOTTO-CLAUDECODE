backtesting:
  max_validation_rounds: 500
  min_confidence_level: 0.95
  training_window: 150
  validation_window: 300
batch_size: 60000
cache:
  # 캐시 TTL (일)
  ttl_days: 7
  # 디스크 캐시 최대 크기 (MB)
  max_disk_cache_mb: 2048
  # 메모리 캐시 최대 항목 수
  max_memory_entries: 200
  # 메모리 압박 임계값 (%) - 이 값 초과 시 자동 정리
  memory_pressure_threshold: 80
  # 자동 정리 활성화
  auto_cleanup_enabled: true
  # 캐시 정리 시 목표 사용률 (%)
  cleanup_target_percent: 60
database:
  batch_size: 60000
  connection_pool_size: 16
  max_batch_memory: 2000000000
  storage_mode: optimized
filter_manager:
  adaptive_batch_sizing: true
  batch_optimization: true
  dynamic_workers: true
  max_workers: 12
  memory_per_worker: 250000000
  parallel_workers: 12
filtering:
  batch_size: 60000
  chunk_size: 5000
  max_workers: 12
  queue_timeout: 30
  use_parallel: true
logging:
  backup_count: 5
  file: logs/lotto_app.log
  format: '%(asctime)s - %(levelname)s - %(message)s'
  level: INFO
  max_size: 20971520
max_workers: 12
ml_models:
  backtesting:
    cache_size: 100
    chunk_size: 20
    parallel_workers: 10
  ensemble:
    n_estimators: 100
    parallel_jobs: 4
  lstm:
    batch_size: 64
    epochs: 50
  monte_carlo:
    batch_size: 750
    n_simulations: 6000
    parallel_workers: 8
ml_prediction:
  max_ml_predictions: 20
  predictions_per_model: 5
  confidence_threshold: 0.6
  target_inclusion_rate: 0.15
  default_prediction_sets: 5
  max_combinations: 20
monitoring:
  db_pool_inclusion_critical: 5.0
  db_pool_inclusion_threshold: 15.0
optimization:
  convergence_patience: 50
  convergence_threshold: 0.01
  max_cumulative_trials: 500
parallel_processing: true
performance:
  auto_scaling: true
  cpu_threshold: 85
  enable_monitoring: true
  memory_threshold: 80
progress_display:
  disable_all: false
  simple_mode: true
