# 전체 시스템 성능 설정 (16코어 시스템 최적화)
parallel_processing: true
max_workers: 12  # CPU 활용률 75% (안정성 확보)
batch_size: 60000  # 메모리 효율성 개선 (31GB 메모리 활용)

database:
  batch_size: 60000  # 스트림 배치 크기 최적화
  max_batch_memory: 2000000000  # 2GB로 확대 (31GB 메모리 활용)
  storage_mode: optimized
  connection_pool_size: 8  # 데이터베이스 연결 풀 최적화
filter_manager:
  batch_optimization: true
  dynamic_workers: true
  max_workers: 12  # CPU 활용률 75% 최적화
  parallel_workers: 12  # 통일된 워커 수
  memory_per_worker: 250000000  # 워커당 250MB 메모리 할당
  adaptive_batch_sizing: true  # 적응형 배치 크기 조정
filtering:
  batch_size: 60000  # 필터링 배치 크기 최적화
  max_workers: 12  # 통일된 워커 수
  use_parallel: true
  chunk_size: 5000  # 메모리 효율적인 청크 크기
  queue_timeout: 30  # 큐 대기 시간 최적화
filters:
  criteria:
    arithmetic_sequence:
      excluded_lengths:
      - 5
      - 6
      min_sequence: 5
    average:
      exclude_extremes: true
      max_average: 32.0
      min_average: 14.0
    consecutive:
      max_consecutive: 5
      min_gap: 1
    digit_sum:
      max_digit_sum: 60
      max_digit_sum_range: 12
      min_digit_sum: 18
      min_digit_sum_range: 2
    dispersion:
      max_avg_gap: 9.0
      max_max_gap: 30
      max_min_gap: 5
      max_std_dev: 220.0
      max_variance: 400.0
      min_avg_gap: 2.5
      min_max_gap: 4
      min_min_gap: 1
      min_std_dev: -200.0
      min_variance: 40.0
    fixed_step:
      all_steps:
        required_matches: 6
        steps_to_exclude:
        - 2
        - 3
      four_steps:
        required_matches: 5
        steps_to_exclude:
        - 2
        - 3
      partial_steps:
        required_matches: 6
        steps_to_exclude:
        - 2
        - 3
      three_steps:
        required_matches: 5
        steps_to_exclude:
        - 2
        - 3
    geometric_sequence:
      excluded_lengths:
      - 4
      - 5
      - 6
      min_sequence: 4
    last_digit:
      min_same_last_digits: 3
    match:
      max_match: 5
    max_gap:
      max_allowed_gap: 30
    multiple:
      global_threshold: 1.0
      multiples:
        2:
        - 0
        - 5
        3:
        - 1
        - 5
        4:
        - 0
        - 3
        5:
        - 0
        - 3
    odd_even:
      excluded_counts:
      - 0
      - 6
    prime_composite:
      max_allowed: 4
      min_allowed: 1
      valid_prime_counts:
      - 2
      - 3
      - 4
    section:
      exclude_all_section: true
      max_numbers_per_section: 4
    sum_range:
      max_sum: 197
      min_sum: 83
    ten_section:
      section_limits:
        section1:
        - 6
        section2:
        - 6
        section3:
        - 6
        section4:
        - 6
        section5:
        - 5
        - 6
  enabled_filters:
  - match
  - odd_even
  - consecutive
  - sum_range
  - fixed_step
  - last_digit
  - max_gap
  - section
  - average
  - multiple
  - ten_section
  - arithmetic_sequence
  - geometric_sequence
  - prime_composite
  - digit_sum
  - dispersion
  filter_efficiency:
    arithmetic_sequence: 0.18
    average: 0.1
    consecutive: 0.3
    digit_sum: 0.2
    dispersion: 0.18
    fixed_step: 0.15
    geometric_sequence: 0.2
    last_digit: 0.1
    match: 0.05
    max_gap: 0.25
    multiple: 0.08
    odd_even: 0.15
    prime_composite: 0.15
    section: 0.22
    sum_range: 0.45
    ten_section: 0.12
logging:
  backup_count: 5
  file: logs/lotto_app.log
  format: '%(asctime)s - %(levelname)s - %(message)s'
  level: INFO
  max_size: 10485760

# 성능 모니터링 설정
performance:
  enable_monitoring: true
  cpu_threshold: 85  # CPU 사용률 임계값 (%)
  memory_threshold: 80  # 메모리 사용률 임계값 (%)
  auto_scaling: true  # 자동 워커 수 조정

# ML/AI 모델 설정
ml_models:
  monte_carlo:
    n_simulations: 6000  # CPU 16코어 기준 최적화 (기존 10,000 → 6,000)
    parallel_workers: 8  # Monte Carlo 전용 워커
    batch_size: 750  # 시뮬레이션 배치 크기
  backtesting:
    parallel_workers: 10  # 백테스팅 워커 수 증가 (기존 8 → 10)
    chunk_size: 20  # 백테스트 청크 크기
    cache_size: 100  # 캐시 크기 최적화
  lstm:
    batch_size: 64  # LSTM 배치 크기
    epochs: 50  # 에포크 수 최적화
  ensemble:
    n_estimators: 100  # 앙상블 추정기 수
    parallel_jobs: 4  # 앙상블 병렬 작업
progress_display:
  disable_all: false
  simple_mode: true
