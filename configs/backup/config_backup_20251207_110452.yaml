backtesting:
  max_validation_rounds: 500
  min_confidence_level: 0.95
  training_window: 150
  validation_window: 300
batch_size: 60000
database:
  batch_size: 60000
  connection_pool_size: 16
  max_batch_memory: 2000000000
  storage_mode: optimized
filter_manager:
  adaptive_batch_sizing: true
  batch_optimization: true
  dynamic_workers: true
  max_workers: 12
  memory_per_worker: 250000000
  parallel_workers: 12
filtering:
  batch_size: 60000
  chunk_size: 5000
  max_workers: 12
  queue_timeout: 30
  use_parallel: true
filters:
  enabled_filters: []
logging:
  backup_count: 5
  file: logs/lotto_app.log
  format: '%(asctime)s - %(levelname)s - %(message)s'
  level: INFO
  max_size: 20971520
max_workers: 12
ml_models:
  backtesting:
    cache_size: 100
    chunk_size: 20
    parallel_workers: 10
  ensemble:
    n_estimators: 100
    parallel_jobs: 4
  lstm:
    batch_size: 64
    epochs: 50
  monte_carlo:
    batch_size: 750
    n_simulations: 6000
    parallel_workers: 8
monitoring:
  db_pool_inclusion_critical: 5.0
  db_pool_inclusion_threshold: 15.0
optimization:
  convergence_patience: 50
  convergence_threshold: 0.01
  max_cumulative_trials: 500
parallel_processing: true
performance:
  auto_scaling: true
  cpu_threshold: 85
  enable_monitoring: true
  memory_threshold: 80
progress_display:
  disable_all: false
  simple_mode: true
