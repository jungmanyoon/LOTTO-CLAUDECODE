database:
  batch_size: 10000
  max_batch_memory: 1000000
  storage_mode: optimized
filtering:
  chunk_size: 50000
  max_workers: 4
  use_parallel: true
filters:
  criteria:
    arithmetic_sequence:
      excluded_lengths:
      - 5
      - 6
      min_sequence: 5
    average:
      exclude_extremes: true
      max_average: 32.8
      min_average: 13.1
    consecutive:
      max_consecutive: 3
      min_gap: 1
    digit_sum:
      max_digit_sum: 60
      max_digit_sum_range: 12
      min_digit_sum: 18
      min_digit_sum_range: 2
    dispersion:
      max_avg_gap: 8.5
      max_max_gap: 31
      max_min_gap: 5
      max_std_dev: 18.0
      max_variance: 324.0
      min_avg_gap: 2.0
      min_max_gap: 2
      min_min_gap: 0
      min_std_dev: 4.0
      min_variance: 16.0
    fixed_step:
      all_steps:
        required_matches: 6
        steps_to_exclude:
        - 2
        - 3
        - 4
        - 5
        - 6
        - 7
      four_steps:
        required_matches: 4
        steps_to_exclude:
        - 2
        - 3
        - 4
      partial_steps:
        required_matches: 5
        steps_to_exclude:
        - 2
        - 3
        - 4
        - 5
      three_steps:
        required_matches: 3
        steps_to_exclude:
        - 2
    geometric_sequence:
      excluded_lengths:
      - 4
      - 5
      - 6
      min_sequence: 4
    last_digit:
      min_same_last_digits: 4
    match:
      max_match: 5
    max_gap:
      max_allowed_gap: 30
    multiple:
      multiples:
        3:
        - 0
        - 5
        4:
        - 0
        - 4
        5:
        - 0
        - 4
    odd_even:
      excluded_counts:
      - 0
      - 6
    prime_composite:
      max_allowed: 5
      min_allowed: 0
      valid_prime_counts:
      - 1
      - 2
      - 3
      - 4
      - 5
    section:
      exclude_all_section: true
      max_numbers_per_section: 5
    sum_range:
      max_sum: 197
      min_sum: 78
    ten_section:
      section_limits:
        section1:
        - 4
        section2:
        - 4
        section3:
        - 4
        section4:
        - 4
        section5:
        - 3
  enabled_filters:
  - sum_range
  - consecutive
  - max_gap
  - section
  - geometric_sequence
  - digit_sum
  - arithmetic_sequence
  - dispersion
  - fixed_step
  - odd_even
  - prime_composite
  - ten_section
  - average
  - last_digit
  - multiple
  - match
  filter_efficiency:
    arithmetic_sequence: 0.18
    average: 0.1
    consecutive: 0.3
    digit_sum: 0.2
    dispersion: 0.18
    fixed_step: 0.15
    geometric_sequence: 0.2
    last_digit: 0.1
    match: 0.05
    max_gap: 0.25
    multiple: 0.08
    odd_even: 0.15
    prime_composite: 0.15
    section: 0.22
    sum_range: 0.45
    ten_section: 0.12
logging:
  backup_count: 5
  file: logs/lotto_app.log
  format: '%(asctime)s - %(levelname)s - %(message)s'
  level: INFO
  max_size: 10485760
