adaptive_options:
  analysis_window: 200
  auto_learning: true
  backtest_validation: true
  max_threshold: 3.0
  min_threshold: 0.3
  safety_mode: true
  update_frequency: 5
auto_adjustment:
  adjustment_interval: 5
  enabled: true
  performance_threshold: 0.85
  probability_priority: true
backtesting_targets:
  combination_count_weight: 0.3
  max_average_matches: 2.0
  min_average_matches: 0.6
  target_inclusion_rate: 0.35
  winning_probability_weight: 0.7
dynamic_criteria:
  ac_value:
    max_ac: 10
    min_ac: 3
    use_scoring: false
  arithmetic:
    exclude_lengths:
    - 5
    - 6
    min_sequence: 5
  average:
    max_average: 41.0
    min_average: 7.0
  balanced_quadrant:
    max_per_quadrant: 5
  consecutive:
    max_consecutive: 5
    min_gap: 1
  digit_sum:
    max_digit_sum: 63
    max_digit_sum_range: 13
    min_digit_sum: 15
    min_digit_sum_range: 0
  dispersion:
    max_std_dev: 20.0
    min_std_dev: 2.0
  fixed_step:
    all_steps:
      required_matches: 5
      steps_to_exclude:
      - 2
      - 3
      - 4
      - 5
    four_steps:
      required_matches: 5
      steps_to_exclude:
      - 2
      - 3
      - 4
    partial_steps:
      required_matches: 5
      steps_to_exclude:
      - 2
      - 3
    three_steps:
      required_matches: 5
      steps_to_exclude:
      - 2
      - 3
  geometric:
    exclude_lengths:
    - 5
    - 6
    min_sequence: 5
  last_digit:
    min_same_last_digits: 4
  match:
    max_match: 6
  max_gap:
    max_allowed_gap: 30
  multiple:
    multiples:
      3:
      - 0
      - 6
      4:
      - 0
      - 6
      5:
      - 0
      - 6
  odd_even:
    excluded_counts:
    - 0
    - 6
  outlier_detection:
    iqr_multiplier: 1.5
    max_outliers: 2
  section:
    exclude_all_section: false
    max_numbers_per_section: 6
  sum_range:
    max_sum: 235
    min_sum: 45
  ten_section:
    section_limits:
      section1:
      - 5
      - 6
      section2:
      - 5
      - 6
      section3:
      - 5
      - 6
      section4:
      - 5
      - 6
      section5:
      - 4
      - 5
      - 6
filters:
  ac_value: true
  arithmetic_sequence: true
  average: false
  balanced_quadrant: true
  consecutive: true
  digit_sum: true
  dispersion: true
  fixed_step: false
  geometric_sequence: true
  last_digit: true
  match: true
  max_gap: false
  multiple: true
  odd_even: false
  outlier_detection: true
  prime_composite: true
  section: false
  sum_range: true
  ten_section: false
global_probability_threshold: 1.5
logging:
  log_excluded_patterns: true
  statistics_interval: 25
  verbosity: INFO
ml_integration:
  ensemble_confidence_threshold: 0.2
  ml_bypass_filters: 10
  ml_weight: 0.5
ml_relaxed_threshold: 0.5
performance:
  batch_size: 5000
  cache_ttl: 1800
  enable_cache: true
  max_workers: 4
  parallel_processing: true
statistical_weights:
  enabled: true
  alpha_ml: 0.65       # ML 점수 가중치 (Optuna 최적화 대상)
  beta_stat: 0.35      # 통계 점수 가중치
  pool_top_n: 300      # 후보 풀 크기 (기존 300 유지)
  factors:
    freq_weight: 0.35  # 번호 빈도 편향 (1214회차 기반, 신뢰도 최고)
    digit_weight: 0.25 # 끝자리 편향 (4,3,1 선호 / 9,8,0 기피)
    absence_weight: 0.20  # 연속 미출현 패턴
    pair_weight: 0.15  # 고빈도 쌍 포함 가중치
    sum_weight: 0.05   # 합계 범위 (경쟁 감소 전략 - 보조)
