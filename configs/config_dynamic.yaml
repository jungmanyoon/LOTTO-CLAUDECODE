database:
  batch_size: 10000
  max_batch_memory: 1000000
  storage_mode: optimized
filtering:
  max_workers: 4
  use_parallel: true
filters:
  criteria:
    arithmetic_sequence:
      excluded_lengths:
      - 6
      min_sequence: 6
    average:
      exclude_extremes: true
      max_average: !!python/object/apply:numpy._core.multiarray.scalar
      - &id001 !!python/object/apply:numpy.dtype
        args:
        - f8
        - false
        - true
        state: !!python/tuple
        - 3
        - <
        - null
        - null
        - null
        - -1
        - -1
        - 0
      - !!binary |
        q6WY2tqoQEA=
      min_average: !!python/object/apply:numpy._core.multiarray.scalar
      - *id001
      - !!binary |
        6yYZ+T+OKUA=
    consecutive:
      max_consecutive: 5
      min_gap: 1
    digit_sum:
      max_digit_sum: 60
      max_digit_sum_range: 12
      min_digit_sum: 18
      min_digit_sum_range: 2
    dispersion:
      max_avg_gap: 9.5
      max_max_gap: 31
      max_min_gap: 5
      max_std_dev: 18.0
      max_variance: 280.0
      min_avg_gap: 1.2
      min_max_gap: 2
      min_min_gap: 0
      min_std_dev: 1.0
      min_variance: 1.0
    fixed_step:
      all_steps:
        required_matches: 6
        steps_to_exclude:
        - 2
        - 3
        - 4
        - 5
      four_steps:
        required_matches: 4
        steps_to_exclude:
        - 2
        - 3
      partial_steps:
        required_matches: 5
        steps_to_exclude:
        - 2
        - 3
        - 4
        - 5
      three_steps:
        required_matches: 3
        steps_to_exclude: []
    geometric_sequence:
      excluded_lengths:
      - 5
      - 6
      min_sequence: 5
    last_digit:
      min_same_last_digits: 5
    match:
      max_match: 6
    max_gap:
      max_allowed_gap: 30
    multiple:
      multiples:
        3:
        - 0
        - 5
        4:
        - 0
        - 4
        5:
        - 0
        - 4
    odd_even:
      excluded_counts:
      - 0
      - 6
    prime_composite:
      max_allowed: 5
      min_allowed: 0
      valid_prime_counts:
      - 1
      - 2
      - 3
      - 4
      - 5
    section:
      exclude_all_section: true
      max_numbers_per_section: 5
    sum_range:
      max_sum: 199
      min_sum: 76
    ten_section:
      section_limits:
        section1:
        - 6
        section2:
        - 6
        section3:
        - 6
        section4:
        - 6
        section5:
        - 5
        - 6
  enabled_filters:
  - odd_even
  - dispersion
  - average
  - sum_range
  filter_efficiency:
    average: 0.012690355329949238
    dispersion: 0.015228426395939087
    odd_even: 0.02961082910321489
    sum_range: 0.010998307952622674
logging:
  backup_count: 5
  file: logs/lotto_app.log
  format: '%(asctime)s - %(levelname)s - %(message)s'
  level: INFO
  max_size: 10485760
