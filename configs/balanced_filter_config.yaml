# 균형잡힌 필터 설정 (목표 통과율: 15%)
# 각 필터별로 적절한 제외율 설정

filters:
  criteria:
    # 합계 범위 필터 (목표: 30% 제외)
    sum_range:
      enabled: true
      min_sum: 90   # 70 → 90 강화
      max_sum: 185  # 210 → 185 강화
    
    # 일치 번호 필터 (목표: 35% 제외) 
    match:
      enabled: true
      min_match: 0
      max_match: 3  # 5 → 3 강화
    
    # 자릿수 합 필터 (목표: 25% 제외)
    digit_sum:
      enabled: true
      min_digit_sum: 25       # 18 → 25 강화
      max_digit_sum: 55       # 60 → 55 강화
      min_digit_sum_range: 4  # 2 → 4 강화  
      max_digit_sum_range: 10 # 12 → 10 강화
    
    # 분산도 필터 (목표: 20% 제외)
    dispersion:
      enabled: true
      min_std_dev: 8.0        # 5.0 → 8.0 강화
      max_std_dev: 14.5       # 16.0 → 14.5 강화
      min_variance: 64.0      # 25.0 → 64.0 강화
      max_variance: 210.0     # 256.0 → 210.0 강화
      min_min_gap: 1          # 0 → 1 강화
      max_min_gap: 3          # 5 → 3 강화
      min_max_gap: 4          # 2 → 4 강화
      max_max_gap: 22         # 31 → 22 강화
      min_avg_gap: 3.0        # 2.0 → 3.0 강화
      max_avg_gap: 7.0        # 8.5 → 7.0 강화
    
    # 소수/합성수 필터 (목표: 20% 제외)
    prime_composite:
      enabled: true
      valid_prime_counts: [2, 3]  # 1,2,3,4,5 → 2,3만 허용
      min_allowed: 2
      max_allowed: 3
    
    # 홀짝 비율 (목표: 15% 제외)
    odd_even:
      enabled: true
      excluded_counts: [0, 1, 5, 6]  # 극단적 패턴 더 많이 제외
    
    # 구간 분포 (목표: 15% 제외)
    section:
      enabled: true
      max_numbers_per_section: 3  # 5 → 3 강화
      exclude_all_section: true
    
    # 10구간 분포 (목표: 20% 제외)
    ten_section:
      enabled: true
      section_limits:
        section1: [0, 1, 2, 3, 4, 5, 6]  # 극단값 제외
        section2: [0, 1, 2, 3, 4, 5, 6]  # 극단값 제외
        section3: [0, 1, 2, 3, 4, 5, 6]  # 극단값 제외
        section4: [0, 1, 2, 3, 4, 5, 6]  # 극단값 제외
        section5: [0, 4, 5, 6]            # 극단값 제외
    
    # 연속 번호 (목표: 10% 제외)
    consecutive:
      enabled: true
      max_consecutive: 3  # 4 → 3 강화
      min_gap: 1
    
    # 평균값 필터 (목표: 25% 제외)
    average:
      enabled: true
      min_average: 15.0     # 10.5 → 15.0 강화
      max_average: 31.0     # 37.0 → 31.0 강화
      exclude_extremes: true
    
    # 배수 필터 (목표: 10% 제외)
    multiple:
      enabled: true
      multiples:
        3: [0, 4]  # 3의 배수 허용 범위 강화
        5: [0, 3]  # 5의 배수 허용 범위 강화
        7: [0, 2]  # 7의 배수 추가
    
    # 최대 간격 (목표: 10% 제외)
    max_gap:
      enabled: true
      max_allowed_gap: 22  # 30 → 22 강화
    
    # 고정 간격 필터 (목표: 15% 제외)
    fixed_step:
      enabled: true
      all_steps:
        required_matches: 5
        steps_to_exclude: [2, 3, 4, 5, 6]
      partial_steps:
        required_matches: 4  
        steps_to_exclude: [2, 3, 4]
      four_steps:
        required_matches: 3
        steps_to_exclude: [2, 3]
      three_steps:
        required_matches: 3
        steps_to_exclude: [2]
      five_steps:
        required_matches: 5
        steps_to_exclude: [2, 3, 4, 5, 6, 7]
      six_steps:
        required_matches: 6
        steps_to_exclude: [2, 3, 4, 5, 6, 7, 8]
    
    # 마지막 자리 (목표: 5% 제외)
    last_digit:
      enabled: true
      min_same_last_digits: 4
    
    # 등차수열 (목표: 5% 제외)
    arithmetic_sequence:
      enabled: true
      min_sequence: 4
      excluded_lengths: [4, 5, 6]
    
    # 등비수열 (목표: 2% 제외)
    geometric_sequence:
      enabled: true
      min_sequence: 3
      excluded_lengths: [3, 4, 5, 6]
    
    # ML 예측 필터 (비활성화)
    ml_prediction:
      enabled: false