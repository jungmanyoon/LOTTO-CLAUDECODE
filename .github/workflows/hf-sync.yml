name: HF Space 자동 재빌드 (GitHub 변경 반영)

# [무료 24/7 Phase 3-b: 2026-07-04]
# GitHub main에 코드/설정/예측결과가 올라오면 HF Space를 factory rebuild 해서
# 최신 코드+데이터를 다시 clone 받게 한다(수동 Factory rebuild 수작업 제거).
# HF Space Dockerfile이 GitHub public repo를 git clone 하므로, restart(빠른재시작)로는
# 옛 코드가 재사용된다 -> factory_reboot=True 로 clone을 다시 하게 해야 최신 반영됨.
#
# 필요: GitHub repo Secret 'HF_TOKEN' (HF Write 토큰). 미설정 시 이 잡은 조용히 스킵(무해).
#
# [2026-07-10 추가] 6시간마다 자동 재빌드(schedule)도 켠다. bulk 예측 커밋은 [skip ci]라
# push 재빌드를 안 부르므로, 옛 구조에선 토요일 주간 작업 때만 재빌드 -> 최대 7일간 화면이
# 안 바뀌는 문제가 있었다. 이제 6시간마다 그동안 GitHub에 쌓인 예측을 화면에 반영한다.

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'   # 6시간마다 (하루 4회) - 누적 예측을 대시보드에 주기 반영
  workflow_dispatch:

concurrency:
  group: hf-sync
  cancel-in-progress: true   # 연속 push 시 최신 1건만 재빌드(중복 빌드 방지)

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: HF Space factory rebuild 트리거
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN 미설정 - 자동 재빌드 스킵(HF에서 수동 Factory rebuild 필요)."
            echo "설정법: HF Settings>Access Tokens에서 write 토큰 발급 -> 이 repo Settings>Secrets>Actions에 HF_TOKEN 등록"
            exit 0
          fi
          pip install -q "huggingface_hub>=0.20"
          python - <<'PY'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          # factory_reboot=True: 캐시 없이 전체 재빌드 -> Dockerfile의 git clone이 다시 돌아 최신 GitHub 반영
          api.restart_space("jungman-yoon/lotto-dashboard", factory_reboot=True)
          print("[OK] HF Space factory rebuild 트리거 완료")
          PY
