name: HF Space 깨우기 (sleep 방지)

# [무료 24/7 Phase 3-a: 2026-07-04]
# HF 무료 Space는 48시간 무활동 시 자동으로 잠든다(sleep). 6시간마다 대시보드에 가벼운
# HTTP 요청을 보내 '활동'을 만들어 깨워둔다. GitHub Actions 무료(public repo 무제한),
# HF 토큰 불필요(공개 URL curl 한 번). 실패해도 무해(다음 주기 재시도).

on:
  schedule:
    - cron: '0 */6 * * *'   # 6시간마다 (48h sleep 전에 충분히 깨움)
  workflow_dispatch:

concurrency:
  group: keep-alive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: HF Space 핑 (깨우기)
        run: |
          URL="https://jungman-yoon-lotto-dashboard.hf.space/"
          CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 120 "$URL" || echo "000")
          echo "HF Space 응답: $CODE"
          # sleep 상태였다면 이 요청이 깨우기 시작(부팅에 수십초). 200/503 모두 정상 취급.
          if [ "$CODE" = "000" ]; then
            echo "::warning::HF Space 무응답(일시적일 수 있음) - 다음 주기 재시도"
          fi
