name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov Flask-WTF Flask-Limiter

    - name: Run unit tests
      run: |
        pytest tests/ -m "unit" -v --cov=src --cov-report=xml

    - name: Run integration tests
      run: |
        pytest tests/ -m "integration" -v --cov=src --cov-append --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: true
        flags: unittests
        name: codecov-umbrella

  lint:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install linting dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pylint black

    - name: Run Black code formatter check
      run: |
        black --check src/ tests/ --line-length 120 || true

    - name: Run Flake8
      run: |
        flake8 src/ tests/ --max-line-length=120 --ignore=E501,W503,E203 --count --statistics || true

    - name: Run Pylint
      run: |
        pylint src/ --max-line-length=120 --disable=C0111,C0103,R0913,R0914,W0703 || true
